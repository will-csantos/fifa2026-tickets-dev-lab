name: Lab Oitavas de Final — Mensageria (Service Bus + Functions)

# Workflow ÚNICO do lab "Oitavas de Final" (Fase 1: Service Bus + Functions).
# Consolida a lógica de três workflows antes separados:
#   - migrate-phase-01.yml  (migrations idempotentes phase-01.sql + phase-03.sql)
#   - deploy-phase-01.yml   (build/test/publish/deploy da Azure Function + smoke)
#   - deploy-frontend.yml   (build Vite + deploy do Web App)
#
# Disparo MANUAL apenas (Actions → "Lab Oitavas de Final" → Run workflow).
# O input `acao` controla O QUE roda:
#   - tudo       → migrations → function → frontend (NESTA ORDEM)
#   - migrations → só as migrations do banco
#   - function   → só build/test/deploy da Function
#   - frontend   → só build/deploy do frontend
#
# DESIGN: um único job `lab` com STEPS sequenciais; cada bloco é guardado por
# `if: ${{ inputs.acao == 'tudo' || inputs.acao == '<bloco>' }}`. Isso garante a
# ordem correta e o seletor SEM cair na pegadinha do GitHub Actions onde um job
# pulado quebra o `needs` dos jobs downstream (não há `needs` entre blocos aqui).
#
# Pré-requisitos no fork (ver runbook docs/runbooks/aula1-f1-portal-guide-ambiente-hml-cin.md):
#   Secrets:  AZURE_CREDENTIALS, SQL_CONNECTION_STRING, FUNCTION_PUBLISH_PROFILE,
#             AZURE_FRONTEND_PUBLISH_PROFILE
#   Vars:     SQL_SERVER, RESOURCE_GROUP, FUNCTION_APP_NAME, FRONTEND_APP_NAME,
#             BACKEND_URL, FUNCTION_V2_URL

on:
  workflow_dispatch:
    inputs:
      acao:
        description: 'O que executar'
        type: choice
        required: true
        default: 'tudo'
        options:
          - tudo
          - migrations
          - function
          - frontend
      sql_server:
        description: '(opcional) SQL server name override — sem .database.windows.net'
        required: false
      resource_group:
        description: '(opcional) Resource group do SQL override'
        required: false
      function_app_name:
        description: '(opcional) Azure Function App name override'
        required: false
      frontend_app_name:
        description: '(opcional) Azure Web App (frontend) name override'
        required: false

env:
  # --- migrations ---
  DEFAULT_SQL_SERVER: 'sql-dev-tk-cin-001'
  DEFAULT_RESOURCE_GROUP: 'rg-hml-tik-cin-001'
  # --- function ---
  FUNCTION_PROJECT_PATH: 'src/Fifa2026.V2.Functions'
  DOTNET_VERSION: '8.0.x'
  # --- frontend ---
  FRONTEND_WORKING_DIR: 'Lovable/World Cup Tickets Hub'
  NODE_VERSION: '20'

jobs:
  lab:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================================================
      # BLOCO 1 — MIGRATIONS  (acao = tudo | migrations)
      # =========================================================
      - name: '[migrations] Azure login (Service Principal)'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'migrations' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: '[migrations] Resolver parâmetros + IP do runner'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'migrations' }}
        run: |
          set -euo pipefail
          # Precedência: input manual -> GitHub Variable -> default.
          SQL_SERVER="${{ inputs.sql_server || vars.SQL_SERVER || env.DEFAULT_SQL_SERVER }}"
          RG="${{ inputs.resource_group || vars.RESOURCE_GROUP || env.DEFAULT_RESOURCE_GROUP }}"
          RUNNER_IP="$(curl -fsS https://api.ipify.org)"
          RULE_NAME="gh-migrate-${{ github.run_id }}"
          {
            echo "SQL_SERVER=$SQL_SERVER"
            echo "RG=$RG"
            echo "RUNNER_IP=$RUNNER_IP"
            echo "RULE_NAME=$RULE_NAME"
          } >> "$GITHUB_ENV"
          echo "SQL: $SQL_SERVER | RG: $RG | runner IP: $RUNNER_IP | rule: $RULE_NAME"

      - name: '[migrations] Abrir acesso temporário (público + firewall do runner)'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'migrations' }}
        run: |
          set -euo pipefail
          az sql server update -g "$RG" -n "$SQL_SERVER" --set publicNetworkAccess=Enabled -o none
          az sql server firewall-rule create -g "$RG" -s "$SQL_SERVER" \
            -n "$RULE_NAME" --start-ip-address "$RUNNER_IP" --end-ip-address "$RUNNER_IP" -o none
          echo "Acesso público + firewall abertos para $RUNNER_IP (regra $RULE_NAME)."
          sleep 10

      - name: '[migrations] phase-01 (source + correlation_id + UQ index)'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'migrations' }}
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.SQL_CONNECTION_STRING }}
          path: fifa2026-api/database/migrations/phase-01.sql

      - name: '[migrations] phase-03 (entra_oid + index)'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'migrations' }}
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.SQL_CONNECTION_STRING }}
          path: fifa2026-api/database/migrations/phase-03.sql

      - name: '[migrations] Reverter acesso (sempre, mesmo em falha)'
        # always() garante o revert mesmo se uma migration falhar; o guard interno
        # evita reverter quando o bloco migrations nem deveria rodar (acao=function/frontend).
        if: ${{ always() && (inputs.acao == 'tudo' || inputs.acao == 'migrations') }}
        run: |
          set +e
          if [ -n "${SQL_SERVER:-}" ] && [ -n "${RG:-}" ]; then
            if [ -n "${RULE_NAME:-}" ]; then
              az sql server firewall-rule delete -g "$RG" -s "$SQL_SERVER" -n "$RULE_NAME" -o none
            fi
            az sql server update -g "$RG" -n "$SQL_SERVER" --set publicNetworkAccess=Disabled -o none
            echo "Acesso revertido: regra removida e Public Network Access = Disabled."
          else
            echo "Contexto incompleto (passo de resolução falhou) — nada a reverter."
          fi

      # =========================================================
      # BLOCO 2 — FUNCTION  (acao = tudo | function)
      # =========================================================
      - name: '[function] Setup .NET'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'function' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: '[function] Restore'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'function' }}
        run: dotnet restore ${{ env.FUNCTION_PROJECT_PATH }}

      - name: '[function] Build'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'function' }}
        run: dotnet build ${{ env.FUNCTION_PROJECT_PATH }} -c Release --no-restore

      - name: '[function] Test'
        # Sem --no-build: o dotnet test faz restore+build do projeto de testes
        # (e da dependência Fifa2026.V2.Functions) em Release.
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'function' }}
        run: dotnet test src/Fifa2026.V2.Functions.Tests -c Release --verbosity normal

      - name: '[function] Publish'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'function' }}
        run: dotnet publish ${{ env.FUNCTION_PROJECT_PATH }} -c Release -o ./publish --no-build

      - name: '[function] Deploy to Azure Functions'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'function' }}
        uses: Azure/functions-action@v1
        with:
          # Precedência: input manual → GitHub Variable.
          app-name: ${{ inputs.function_app_name || vars.FUNCTION_APP_NAME }}
          package: ./publish
          publish-profile: ${{ secrets.FUNCTION_PUBLISH_PROFILE }}

      - name: '[function] Smoke test (AC-10) — POST /api/v2/purchase'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'function' }}
        env:
          APP_NAME: ${{ inputs.function_app_name || vars.FUNCTION_APP_NAME }}
        run: |
          set -euo pipefail
          echo "Aguardando warmup da Function App (cold start)..."
          sleep 20
          curl -fsS "https://${APP_NAME}.azurewebsites.net/api/v2/purchase" \
            -H "Content-Type: application/json" \
            -d '{"matchId":1,"category":"VIP","userId":1,"quantity":1}' | tee response.json
          # Falha o job se .correlationId não estiver presente na resposta.
          jq -e '.correlationId' response.json
          echo "Smoke test OK — .correlationId presente na resposta."

      # =========================================================
      # BLOCO 3 — FRONTEND  (acao = tudo | frontend)
      # =========================================================
      - name: '[frontend] Setup Node.js'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'frontend' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_WORKING_DIR }}/package-lock.json

      - name: '[frontend] Install dependencies (npm ci)'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'frontend' }}
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        run: npm ci

      - name: '[frontend] Build (vite)'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'frontend' }}
        working-directory: ${{ env.FRONTEND_WORKING_DIR }}
        env:
          # BACKEND_URL → substituído no web.config (proxy reverso) e usado pelo set-backend-url.
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          # VITE_API_URL → caminho RELATIVO same-origin (/api). O browser chama /api e o
          # web.config (BACKEND_URL acima) faz o proxy server-side até o backend PRIVADO
          # via VNet. NÃO usar URL absoluta do backend: ele tem publicNetworkAccess=Disabled
          # e o navegador não o alcança direto (provado empiricamente: Failed to fetch).
          VITE_API_URL: /api
          # VITE_FUNCTION_V2_URL → URL raiz da Function; presença = compra v2 async (Oitavas).
          VITE_FUNCTION_V2_URL: ${{ vars.FUNCTION_V2_URL }}
        run: npm run build

      - name: '[frontend] Deploy to Azure Web App'
        if: ${{ inputs.acao == 'tudo' || inputs.acao == 'frontend' }}
        uses: azure/webapps-deploy@v3
        with:
          # Precedência: input manual → GitHub Variable.
          app-name: ${{ inputs.frontend_app_name || vars.FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: '${{ env.FRONTEND_WORKING_DIR }}/dist'
